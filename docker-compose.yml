version: '3.8'

services:
  blockchain:
    build: ./blockchain
    ports:
      - "8545:8545"
    networks:
      - defi-network

  oracle-service:
    build: ./oracle-service
    ports:
      - "3001:3001"
    environment:
      - RPC_URL=http://blockchain:8545
      - ORACLE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - ORACLE_CONTRACT_ADDRESS=0x5FbDB2315678afecb367f032d93F642f64180aa3
    depends_on:
      - blockchain
    networks:
      - defi-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BETTING_MARKET_ADDRESS=0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512
    depends_on:
      - blockchain
    networks:
      - defi-network

networks:
  defi-network:
    driver: bridge
