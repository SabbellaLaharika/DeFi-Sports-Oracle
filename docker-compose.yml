services:
  hardhat:
    build: ./blockchain
    volumes:
      - ./blockchain:/app
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 5s
      timeout: 2s
      retries: 10

  oracle:
    build: ./oracle-service
    env_file:
      - ./oracle-service/.env
    ports:
      - "3001:3001"
    volumes:
      - ./blockchain:/app/shared
    depends_on:
      deployer:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./blockchain/deployed-addresses.json:/app/public/deployed-addresses.json
    depends_on:
      deployer:
        condition: service_completed_successfully

  deployer:
    build: ./blockchain
    volumes:
      - ./blockchain:/app
    command: >
      sh -c "npx hardhat run scripts/deploy.js --network localhost"
    network_mode: "service:hardhat"
    depends_on:
      hardhat:
        condition: service_healthy
