
services:
  hardhat:
    build: ./blockchain
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./shared:/app/shared

  oracle:
    build: ./oracle-service
    env_file:
      - ./oracle-service/.env
    ports:
      - "3001:3001"
    depends_on:
      hardhat:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./shared:/app/shared

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - oracle
    volumes:
      - ./shared:/app/public/shared
